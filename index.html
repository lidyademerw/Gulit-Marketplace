<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Gulit-Marketplace</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="#" class="nav-item">home</a></li>
        <li><a href="#" class="nav-item">ሐበሻ ቀሚስ </a></li>

        <li class="has-submenu">
          <a href="#" class="nav-item" id="cultural-trigger"
            >ethiopian cultural materials</a
          >
          <div class="submenu" id="cultural-menu">
            <a href="#">ሙሶብ (Mesob)</a>
            <a href="#">ሸክላ (Shkla)</a>
          </div>
        </li>

        <li><a href="#" class="nav-item">Habesha jewelry</a></li>
        <li><a href="#" class="nav-item">ቅመማቅመም</a></li>
        <li><a href="#" class="nav-item">ethiopian food</a></li>
        <li><a href="#" class="nav-item">Info</a></li>

        <div class="search-container">
          <input
            type="text"
            placeholder="ፈልግ... (Search items)"
            id="search-input"
          />
          <button id="search-btn">🔍</button>
        </div>
      </ul>
    </nav>
    <section class="hero">
      <div class="hero-content">
        <!-- Left Image -->
        <div class="hero-image-container left">
          <img
            src="home page 2.jpg"
            alt="Ethiopian Market"
            class="tilted-img"/>
        </div>

        <!-- Center Text -->
        <div class="hero-text">
          <h1>Welcome to <span class="brand-name">ጉሊት</span></h1>
          <p>Bridging the gap for Ethiopian craftswomen.</p>
        </div>

        <!-- Right Image -->
        <div class="hero-image-container right">
          <img src="homepage1.jpg" alt="Artisan at work" class="tilted-img" />
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
